<ion-content [fullscreen]="true" class="login-content">
  <main class="login-page">
    <ion-card class="login-card">
      <section class="brand">
        <h1>HonestBite</h1>
        <p>Entra na tua conta para descobrir reviews honestas de restaurantes.</p>
      </section>

      <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()" class="login-form">
        <ion-list lines="none" class="form-list">
          <ion-item class="premium-input">
            <ion-icon name="mail-outline" slot="start"></ion-icon>

            <ion-input
              label="E-mail"
              label-placement="floating"
              type="email"
              inputmode="email"
              autocomplete="email"
              formControlName="email"
            ></ion-input>
          </ion-item>

          <ion-note color="danger" *ngIf="email?.touched && email?.invalid">
            Introduz um e-mail válido.
          </ion-note>

          <ion-item class="premium-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

            <ion-input
              label="Palavra-passe"
              label-placement="floating"
              [type]="mostrarPassword ? 'text' : 'password'"
              autocomplete="current-password"
              formControlName="password"
            ></ion-input>

            <ion-button
              slot="end"
              fill="clear"
              type="button"
              class="password-toggle"
              (click)="alternarPassword()"
              [attr.aria-label]="mostrarPassword ? 'Esconder password' : 'Mostrar password'"
            >
              <ion-icon [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-item>

          <ion-note color="danger" *ngIf="password?.touched && password?.invalid">
            A password deve ter pelo menos 6 caracteres.
          </ion-note>
        </ion-list>

        <ion-button
          expand="block"
          type="submit"
          class="login-button"
          [disabled]="loginForm.invalid"
        >
          Entrar
        </ion-button>
      </form>

      <footer class="login-links">
        <a href="#">Esqueceste-te da password?</a>
        <span>Ainda não tens conta? <a href="#">Regista-te aqui</a></span>
      </footer>
    </ion-card>
  </main>
</ion-content>
