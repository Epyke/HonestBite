<ion-content [fullscreen]="true" class="forgot-content">
  <main class="forgot-page">
    <ion-card class="forgot-card">
      <section class="brand">
        <h1>Recuperar Password</h1>
        <p>Introduz o teu e-mail para receberes as instruções de recuperação.</p>
      </section>

      <form [formGroup]="forgotForm" (ngSubmit)="recuperar()" class="forgot-form">
        <ion-list lines="none" class="form-list">
          <ion-item class="premium-input">
            <ion-icon name="mail-outline" slot="start"></ion-icon>

            <ion-input
              label="E-mail"
              label-placement="floating"
              type="email"
              inputmode="email"
              autocomplete="email"
              formControlName="email"
            ></ion-input>
          </ion-item>

          @if (email?.touched && email?.invalid) {
            <ion-note color="danger">Introduz um e-mail válido.</ion-note>
          }
        </ion-list>

        <ion-button
          expand="block"
          type="submit"
          class="forgot-button"
          [disabled]="forgotForm.invalid"
        >
          Enviar E-mail
        </ion-button>
      </form>

      <footer class="forgot-links">
        <a routerLink="/login">Voltar ao Login</a>
      </footer>
    </ion-card>
  </main>
</ion-content>
