<ion-content class="viewer-content" (click)="dismiss()">
  <ion-button class="close-btn" (click)="dismiss()">
    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
  </ion-button>
  <div class="image-container" (click)="$event.stopPropagation()">
    <img [src]="photoUrl" [alt]="alt" class="full-image" />
  </div>
</ion-content>
